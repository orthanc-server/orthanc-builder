on:
  workflow_call:
    outputs:
      is_tag: 
        value: ${{ jobs.pre_build.outputs.is_tag }}
      current_branch_tag: 
        value: ${{ jobs.pre_build.outputs.current_branch_tag }}
    secrets:
      aws_access_key_id:
        required: true
      aws_secret_access_key:
        required: true

jobs:

  pre_build:
    name: pre_build
    runs-on: "debian-arm64"
    outputs:
      current_branch_tag: ${{steps.branch_name.outputs.current_branch_tag}}
      is_tag: ${{steps.branch_name.outputs.is_tag}}

    steps:
    - name: Get branch/tag name
      id: branch_name
      run: |
        echo "current_branch_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
        [[ "${GITHUB_REF_TYPE}" == "tag" ]] && echo "is_tag=true" >> $GITHUB_OUTPUT || echo "is_tag=false" >> $GITHUB_OUTPUT

    - name: Echo pre_build
      run: |
        echo ${{ steps.branch_name.outputs.is_tag }} ${{ steps.branch_name.outputs.current_branch_tag }}
        echo ${{ github.ref}}

    - uses: actions/checkout@v3

    - name: Get Commit id matrix (unstable)
      run: ./local-build.sh step=generate-commit-id-matrix version=unstable
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret_access_key }}

    - name: Get Commit id matrix (stable)
      run: ./local-build.sh step=generate-commit-id-matrix version=stable
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.aws_secret_access_key }}

    - name: Upload unstable commit id matrix as artifact
      uses: actions/upload-artifact@v4
      with:
        name: commit-ids-matrix-unstable
        path: /tmp/commit-ids-matrix-unstable.json

    - name: Upload stable commit id matrix as artifact
      uses: actions/upload-artifact@v4
      with:
        name: commit-ids-matrix-stable
        path: /tmp/commit-ids-matrix-stable.json

